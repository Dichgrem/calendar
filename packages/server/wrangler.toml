name = "calendar"
main = "src/worker.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database ─────────────────────────────────────────────────────────────
# 1. Run: wrangler d1 create calendar-db
# 2. Paste the returned database_id below
[[d1_databases]]
binding = "DB"
database_name = "calendar-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ── Environment Variables ───────────────────────────────────────────────────
# Secrets should be set via: wrangler secret put SESSION_SECRET
# Not hard-coded here for security.
#
# Required secrets:
#   SESSION_SECRET - Random string for session signing
#
# Optional vars (safe to put in wrangler.toml):
# [vars]
# CORS_ORIGIN = "https://your-domain.pages.dev"
