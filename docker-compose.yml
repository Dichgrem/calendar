services:
  calendar:
    image: brantcoat/calendar:latest
    ports:
      - "127.0.0.1:3000:3000"  # only localhost; use reverse proxy for external access
    environment:
      - DATABASE_URL=/app/data/calendar.db
    volumes:
      - calendar-data:/app/data
    restart: unless-stopped

volumes:
  calendar-data:
