services:
  calendar:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=/app/data/calendar.db
      - SESSION_SECRET=change-me-in-production
    volumes:
      - calendar-data:/app/data
      # Optional: mount custom config to override defaults
      # - ./config.json:/app/packages/server/config.json:ro
    restart: unless-stopped

volumes:
  calendar-data:
