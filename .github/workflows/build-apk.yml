name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t apk -f Dockerfile.capacitor .

      - name: Extract APK
        run: docker cp $(docker create apk):/apk/app-release.apk ./app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.apk
